azure:
  free_disk_space: true
  max_parallel: 25
  settings_linux:
    swapfile_size: 15GiB
  settings_win:
    variables:
      CONDA_BLD_PATH: C:\\bld\\
      SET_PAGEFILE: 'True'
bot:
  automerge: true
build_platform:
  linux_aarch64: linux_64
conda_build:
  pkg_format: '2'
conda_build_tool: rattler-build
conda_forge_output_validation: true
conda_install_tool: pixi
github:
  branch_name: main
  tooling_branch_name: main
provider:
  osx_arm64: default
  linux_64: azure
  linux_aarch64: azure
  win_64: github_actions
test: native_and_emulated
